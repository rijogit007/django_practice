<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .todo-card {
            border-radius: 15px;
        }

        .completed-task {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow todo-card">
                <div class="card-body">

                    <h2 class="text-center mb-4">
                        📝 Todo App
                    </h2>
                     <form action="{% url 'add-task'  %}" method="POST" >  
                      {% csrf_token %}  
                    <!-- Add Task -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            Add New Task
                        </label>
                         
                        <div class="input-group">
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter task..."
                                name="taskname"
                                required
                            >
                            <button class="btn btn-primary">
                                Add Task
                            </button>
                        </div>
                    </div>
                </form>  
                        
                    <!-- Task List -->
                    <h4 class="mb-3">
                        Pending Tasks
                    </h4>
                    {% for task in task_list %}
                    <ul class="list-group mb-4">

                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            {{ task.taskname }}
                            <div>
                                <button  class="btn btn-success btn-sm">
                                   <a href="{% url 'mark_as_done' task.id %}" class="btn btn-success btn-sm">Mark as done</a>
                                </button>
                                <button class="btn btn-danger btn-sm">
                                    <a href="{% url 'delete' task.id %}" class="btn btn-danger btn-sm">Delete</a>
                                </button>

                                <button class="btn btn-primary btn-sm">
                                    <a href="{% url 'edit_task' task.id %}" class="btn btn-primary btn-sm">Edit</a>
                                </button>
                            </div>
                        </li>

                       

                    </ul>
                    {% endfor %}





                    <!-- Completed Tasks -->
                     
                    <h4 class="mb-3">
                        Completed Tasks
                    </h4>
                    {% for task in completed_task  %}
                    <ul class="list-group">

                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="completed-task">
                                {{task.taskname}}
                            </span>

                            <button href="" class="btn btn-danger btn-sm">
                                <a href="{% url 'delete_completed_task' task.id %}" class="btn btn-danger btn-sm">Delete</a>
                            </button>

                             <button  class="btn btn-warning btn-sm">
                                   <a href="{% url 'mark_as_undone' task.id %}" class="btn btn-warning btn-sm">Mark as undone</a>
                                </button>
                        </li>

                        

                    </ul>
                {% endfor %}

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
